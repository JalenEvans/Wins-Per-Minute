name: Run Postman Tests

on: 
  push: 
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs: 
  postman-tests:
    runs-on: ubuntu-latest

    env: 
      NODE_ENV: ${{ secrets.NODE_ENV }}
      PORT: ${{ secrets.PORT }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      EMAIL: ${{ secrets.EMAIL }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Node.JS
      uses: actions/setup-node@v3
      with:
          node-version: '20'
    
    - name: Install Dependencies
      run: npm install
      working-directory: ./wins-per-minute-backend 

    - name: Install Newman
      run: npm install -g newman

    - name: Run Server in the Background

      run: node wins-per-minute-backend/server.js

    - name: Wait for Server to Start
      run: |
          node wins-per-minute-backend/scripts/wait-for-server.js
          sleep 5

    - name: Run Postman Collection
      run: newman run wins-per-minute-backend/postman/Authentication.postman_collection.json -e wins-per-minute-backend/postman/Authentication.postman_fake_environment.json
